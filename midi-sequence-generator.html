<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MIDI Multi-Sequence Generator for song structure composition.">
    <title>MIDI Multi-Sequence Generator</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap");

        :root {
            --bg-1: #060c14;
            --bg-2: #0a121d;
            --panel: linear-gradient(160deg, #1a2331 0%, #151e2a 42%, #0f1622 100%);
            --panel-border: #3b4f68;
            --text: #d8e4f2;
            --muted: #8ea1b8;
            --accent: #3aa0ff;
            --accent-2: #1f73d2;
            --danger: #ff7f8e;
            --ok: #79e0a4;
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Barlow Condensed", "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--text);
            margin: 0;
            background: radial-gradient(900px 460px at 15% -10%, #17314f 0%, transparent 58%),
                        radial-gradient(900px 500px at 95% 10%, #0d2745 0%, transparent 52%),
                        linear-gradient(180deg, var(--bg-2), var(--bg-1));
            min-height: 100vh;
            line-height: 1.4;
        }

        .container {
            width: min(1260px, 100% - 2rem);
            margin: 1.5rem auto 2rem auto;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.4rem 0;
            letter-spacing: 0.08em;
            text-shadow: 0 0 12px rgba(58, 160, 255, 0.25);
        }

        .subtitle {
            color: var(--muted);
            margin: 0 0 1rem 0;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }

        .status {
            margin: 0 0 1rem 0;
            padding: 0.5rem 0.7rem;
            border-radius: 8px;
            border: 1px solid #355274;
            background: linear-gradient(180deg, rgba(23, 36, 51, 0.9), rgba(13, 21, 31, 0.9));
            color: var(--muted);
            min-height: 2.1rem;
        }

        .status.ok {
            color: var(--ok);
        }

        .status.error {
            color: var(--danger);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .section-box {
            border: 1px solid #2f4a67;
            border-radius: 10px;
            background: linear-gradient(180deg, #1d2d40 0%, #162433 100%);
            padding: 0.9rem;
        }

        .section-box h3 {
            margin: 0 0 0.75rem 0;
            font-size: 0.86rem;
            font-weight: 700;
            color: #b8d8ff;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.7rem;
        }

        .sequence-field label {
            display: block;
            font-size: 0.76rem;
            font-weight: 600;
            color: #9fc7ef;
            margin-bottom: 0.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        select,
        input[type="range"],
        button,
        textarea {
            font: inherit;
            color: var(--text);
        }

        select,
        input[type="range"] {
            width: 100%;
            padding: 0.45rem;
            background: linear-gradient(180deg, #243345 0%, #1a2736 100%);
            border: 1px solid #3c536e;
            border-radius: 6px;
        }

        .clock-mode-select.clock-signal-blink {
            box-shadow: 0 0 0 2px rgba(58, 160, 255, 0.55);
            border-color: #74bcff;
        }

        .tempo-toggle.is-hidden {
            opacity: 0.45;
            pointer-events: none;
        }

        .tempo-bpm {
            margin-left: 0.4rem;
            color: #8ec8ff;
            font-size: 0.76rem;
            letter-spacing: 0.04em;
        }

        .song-structure-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
        }

        .structure-preset {
            padding: 0.65rem;
            background: linear-gradient(180deg, #243345 0%, #1a2736 100%);
            border: 1px solid #3c536e;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            font-size: 0.76rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .structure-preset:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(58, 160, 255, 0.2);
        }

        .structure-preset.active {
            background: linear-gradient(180deg, var(--accent-2), var(--accent));
            border-color: var(--accent);
            color: #fff;
        }

        button {
            padding: 0.55rem 0.8rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        button:hover {
            box-shadow: 0 6px 16px rgba(58, 160, 255, 0.3);
            transform: translateY(-1px);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .button-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .song-structure-list {
            padding: 0.7rem;
            background: linear-gradient(180deg, rgba(29, 45, 64, 0.8), rgba(22, 36, 51, 0.8));
            border: 1px solid #2f4a67;
            border-radius: 8px;
            font-size: 0.74rem;
            line-height: 1.45;
            max-height: 7.8rem;
            overflow: auto;
        }
        

        .sequence-editors {
            margin-top: 1rem;
            display: grid;
            gap: 0.65rem;
            max-height: none;
            overflow: visible;
            padding-right: 0.2rem;
        }

        .sequence-card {
            border: 1px solid #355274;
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(23, 36, 51, 0.95), rgba(13, 21, 31, 0.94));
            padding: 0.55rem;
        }

        .sequence-card.is-playing {
            border-color: #69b4ff;
            box-shadow: inset 0 0 0 1px rgba(105, 180, 255, 0.3), 0 0 0 1px rgba(58, 160, 255, 0.22);
        }

        .sequence-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
        }

        .sequence-card-title {
            margin: 0;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #b8d8ff;
        }

        .sequence-meta {
            color: #7fa5cc;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sequence-play-indicator {
            margin-top: 0.35rem;
            padding: 0.3rem 0.45rem;
            border-radius: 6px;
            border: 1px solid #355274;
            background: linear-gradient(180deg, rgba(25, 40, 58, 0.9), rgba(18, 29, 42, 0.9));
            color: #8caecf;
            font-size: 0.71rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sequence-play-indicator.is-playing {
            border-color: #69b4ff;
            color: #cfe9ff;
            background: linear-gradient(180deg, rgba(39, 77, 116, 0.9), rgba(26, 50, 78, 0.9));
        }

        .sequence-text {
            width: 100%;
            min-height: 3.2rem;
            resize: vertical;
            border-radius: 8px;
            border: 1px solid #3c536e;
            background: linear-gradient(180deg, #243345 0%, #1a2736 100%);
            padding: 0.45rem;
            font-size: 0.78rem;
            line-height: 1.3;
        }

        .sequence-help {
            color: #89a7c8;
            font-size: 0.7rem;
            margin-top: 0.3rem;
        }

        

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .settings-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .container {
                width: min(100% - 1rem, 900px);
            }

            h1 {
                font-size: 1.3rem;
            }

            .settings-grid,
            .song-structure-grid,
            .button-grid,
            .button-grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <main class="panel">
            <h1>MIDI Multi-Sequence Generator</h1>
            <p class="subtitle">Generate sequences by song part, edit them and play the whole song or individual parts.</p>
            <div id="status" class="status">Waiting for MIDI...</div>

            <div class="main-grid">
                <section class="section-box" aria-label="Sequence generator">
                    <h3>Sequence Settings</h3>
                    <div class="settings-grid">
                        <div class="sequence-field">
                            <label for="max-steps">Max Steps</label>
                            <select id="max-steps">
                                <option value="4">4</option>
                                <option value="8">8</option>
                                <option value="12">12</option>
                                <option value="16">16</option>
                                <option value="24">24</option>
                                <option value="32" selected>32</option>
                            </select>
                        </div>

                        <div class="sequence-field">
                            <label for="sequence-root">Root</label>
                            <select id="sequence-root">
                                <option value="60" selected>C</option>
                                <option value="61">C#</option>
                                <option value="62">D</option>
                                <option value="63">D#</option>
                                <option value="64">E</option>
                                <option value="65">F</option>
                                <option value="66">F#</option>
                                <option value="67">G</option>
                                <option value="68">G#</option>
                                <option value="69">A</option>
                                <option value="70">A#</option>
                                <option value="71">B</option>
                            </select>
                        </div>

                        <div class="sequence-field">
                            <label for="sequence-scale">Scale</label>
                            <select id="sequence-scale">
                                <option value="major">Major</option>
                                <option value="minor" selected>Minor</option>
                                <option value="pentatonic">Pentatonic</option>
                                <option value="dorian">Dorian</option>
                            </select>
                        </div>

                        <div class="sequence-field">
                            <label for="sequence-density">Density</label>
                            <input id="sequence-density" type="range" min="1" max="8" value="4">
                        </div>

                        <div class="sequence-field tempo-toggle" id="tempo-toggle" aria-live="polite">
                            <label for="sequence-tempo">Tempo <span id="tempo-bpm" class="tempo-bpm">120 BPM</span></label>
                            <input id="sequence-tempo" type="range" min="60" max="180" value="120">
                        </div>

                        <div class="sequence-field">
                            <label for="sequence-clock-mode">Clock Mode</label>
                            <select id="sequence-clock-mode" class="clock-mode-select" aria-label="Select clock mode">
                                <option value="off" selected>Clock off</option>
                                <option value="in">Clock in</option>
                                <option value="out">Clock out</option>
                            </select>
                        </div>
                    </div>

                    <div class="settings-grid" style="margin-top:0.55rem;">
                        <div class="sequence-field">
                            <label for="midi-output">MIDI Output</label>
                            <select id="midi-output" aria-label="Select MIDI output"></select>
                        </div>
                        <div class="sequence-field">
                            <label for="midi-channel">Channel</label>
                            <select id="midi-channel" aria-label="Select MIDI channel">
                                <option value="1" selected>1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                            </select>
                        </div>
                    </div>

                    <div class="section-box" style="margin-top:0.7rem; padding:0.7rem;">
                        <h3>Song Structure</h3>
                        <div class="song-structure-grid">
                            <button type="button" class="structure-preset active" data-structure="aaba">AABA</button>
                            <button type="button" class="structure-preset" data-structure="abba">ABBA</button>
                            <button type="button" class="structure-preset" data-structure="verse-chorus">Verse-Chorus</button>
                            <button type="button" class="structure-preset" data-structure="custom">Custom</button>
                        </div>
                    </div>

                    <div class="button-grid">
                        <button id="generate-all-btn" type="button">Generate All</button>
                        <button id="play-song-btn" type="button">Play Song</button>
                        <button id="stop-sequence-btn" type="button">Stop</button>
                    </div>
                    <div class="button-grid-2">
                        <button id="export-btn" type="button">Export</button>
                        <button id="import-btn" type="button">Import</button>
                    </div>
                    <input type="file" id="import-file" accept=".json" style="display:none;">

                </section>

                <section class="section-box" aria-label="Song parts">
                    <h3>Song Sections</h3>
                    <p class="subtitle" style="margin:0 0 0.6rem 0;">Section Editors</p>
                    <div class="sequence-editors" id="sequence-editors"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const songStructures = {
            aaba: {
                name: "AABA Form",
                parts: [
                    { name: "Intro", steps: 8, density: 3 },
                    { name: "Verse A", steps: 16, density: 4 },
                    { name: "Verse A Repeat", steps: 16, density: 4 },
                    { name: "Bridge B", steps: 16, density: 5 },
                    { name: "Verse A Return", steps: 16, density: 4 },
                    { name: "Outro", steps: 8, density: 2 }
                ]
            },
            abba: {
                name: "ABBA Form",
                parts: [
                    { name: "Intro", steps: 8, density: 3 },
                    { name: "Theme A", steps: 16, density: 4 },
                    { name: "Theme B", steps: 16, density: 5 },
                    { name: "Theme B Repeat", steps: 16, density: 5 },
                    { name: "Theme A Return", steps: 16, density: 4 },
                    { name: "Outro", steps: 8, density: 2 }
                ]
            },
            "verse-chorus": {
                name: "Verse-Chorus Form",
                parts: [
                    { name: "Intro", steps: 8, density: 2 },
                    { name: "Verse", steps: 16, density: 4 },
                    { name: "Pre-Chorus", steps: 8, density: 5 },
                    { name: "Chorus", steps: 16, density: 6 },
                    { name: "Verse 2", steps: 16, density: 4 },
                    { name: "Pre-Chorus 2", steps: 8, density: 5 },
                    { name: "Chorus 2", steps: 16, density: 6 },
                    { name: "Bridge", steps: 16, density: 5 },
                    { name: "Chorus Final", steps: 16, density: 6 },
                    { name: "Outro", steps: 8, density: 2 }
                ]
            },
            custom: {
                name: "Custom Form",
                parts: [
                    { name: "Intro", steps: 8, density: 3 },
                    { name: "Verse", steps: 16, density: 4 },
                    { name: "Chorus", steps: 16, density: 5 },
                    { name: "Verse 2", steps: 16, density: 4 },
                    { name: "Chorus 2", steps: 16, density: 5 },
                    { name: "Bridge", steps: 16, density: 6 },
                    { name: "Outro", steps: 8, density: 2 }
                ]
            }
        };

        const statusEl = document.getElementById("status");
        const outputSelect = document.getElementById("midi-output");
        const channelSelect = document.getElementById("midi-channel");
        const sequenceTempoInput = document.getElementById("sequence-tempo");
        const tempoBpmLabel = document.getElementById("tempo-bpm");
        const sequenceClockModeSelect = document.getElementById("sequence-clock-mode");
        const tempoToggle = document.getElementById("tempo-toggle");
        const editorsContainer = document.getElementById("sequence-editors");
        

        let currentStructure = "aaba";
        let generatedSequences = {};

        let midi = null;
        let midiInputs = [];
        let midiOutputs = [];
        let midiOutput = null;
        let midiChannel = 1;

        let sequenceTimer = null;
        let sequenceClockTimer = null;
        let sequenceAudioCtx = null;
        let nextClockTickTime = 0;
        let activeSequenceNote = null;
        let sequenceIsPlaying = false;
        let sequenceArmed = false;
        let externalClockTickCount = 0;
        const midiClockTicksPerStep = 12;
        let clockSignalBlinkTimer = null;

        let playbackQueue = [];
        let playbackPartIndex = 0;
        let playbackStepIndex = 0;
        let currentPlayingPartName = "";
        let currentPlayingStepIndex = -1;

        function setStatus(message, tone = "") {
            statusEl.textContent = message;
            statusEl.className = `status${tone ? ` ${tone}` : ""}`;
        }

        function noteName(note) {
            const names = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            return `${names[note % 12]}${Math.floor(note / 12) - 1}`;
        }

        function getScaleIntervals(scale) {
            const scales = {
                major: [0, 2, 4, 5, 7, 9, 11],
                minor: [0, 2, 3, 5, 7, 8, 10],
                pentatonic: [0, 3, 5, 7, 10],
                dorian: [0, 2, 3, 5, 7, 9, 10]
            };
            return scales[scale] || scales.minor;
        }

        function getClockMode() {
            return sequenceClockModeSelect.value;
        }

        function updateTempoLabel() {
            tempoBpmLabel.textContent = `${sequenceTempoInput.value} BPM`;
        }

        function updateClockModeUi() {
            const isClockIn = getClockMode() === "in";
            tempoToggle.classList.toggle("is-hidden", isClockIn);
        }

        function blinkClockModeSignal() {
            sequenceClockModeSelect.classList.add("clock-signal-blink");
            if (clockSignalBlinkTimer) {
                clearTimeout(clockSignalBlinkTimer);
            }
            clockSignalBlinkTimer = setTimeout(() => {
                sequenceClockModeSelect.classList.remove("clock-signal-blink");
                clockSignalBlinkTimer = null;
            }, 90);
        }

        function channelStatus(baseStatus) {
            return baseStatus + (midiChannel - 1);
        }

        function sendNoteOn(note, velocity) {
            if (!midiOutput) return;
            midiOutput.send([channelStatus(0x90), note, velocity]);
        }

        function sendNoteOff(note) {
            if (!midiOutput) return;
            midiOutput.send([channelStatus(0x80), note, 0]);
        }

        function sendMidiClock() {
            if (!midiOutput) return;
            midiOutput.send([0xF8]);
            blinkClockModeSignal();
        }

        function sendMidiStart() {
            if (!midiOutput) return;
            midiOutput.send([0xFA]);
        }

        function sendMidiStop() {
            if (!midiOutput) return;
            midiOutput.send([0xFC]);
        }

        function generateSequenceForPart(steps, root, scale, density) {
            const intervals = getScaleIntervals(scale);
            return Array.from({ length: steps }, (_, index) => {
                const useNote = Math.floor(Math.random() * 8) < density;
                const degree = intervals[Math.floor(Math.random() * intervals.length)];
                const octaveShift = index % 8 === 7 ? 12 : (Math.random() > 0.8 ? 12 : 0);
                const note = useNote ? root + degree + octaveShift : root + intervals[0];
                const velocity = Math.floor(88 + Math.random() * 32);
                return {
                    note: Math.max(36, Math.min(96, note)),
                    velocity,
                    gate: Math.random() > 0.2
                };
            });
        }

        function sequenceToText(sequence) {
            return sequence.map((step) => step.gate ? String(step.note) : "-").join(" ");
        }

        function parseSequenceText(text) {
            const tokens = text.trim().split(/[\s,;|]+/).filter(Boolean);
            if (tokens.length === 0) return [];

            return tokens.map((token) => {
                const t = token.toLowerCase();
                if (t === "-" || t === "x" || t === "rest") {
                    return { note: 60, velocity: 96, gate: false };
                }
                const n = Number.parseInt(token, 10);
                if (Number.isFinite(n)) {
                    return {
                        note: Math.max(0, Math.min(127, n)),
                        velocity: 96,
                        gate: true
                    };
                }
                return { note: 60, velocity: 96, gate: false };
            });
        }

        function normalizeImportedSequence(sequence) {
            if (!Array.isArray(sequence)) return [];
            return sequence.map((step) => {
                if (typeof step === "number") {
                    return { note: Math.max(0, Math.min(127, step)), velocity: 96, gate: true };
                }
                if (step && typeof step === "object") {
                    const note = Number.isFinite(step.note) ? step.note : 60;
                    const velocity = Number.isFinite(step.velocity) ? step.velocity : 96;
                    const gate = typeof step.gate === "boolean" ? step.gate : true;
                    return {
                        note: Math.max(0, Math.min(127, note)),
                        velocity: Math.max(1, Math.min(127, velocity)),
                        gate
                    };
                }
                return { note: 60, velocity: 96, gate: false };
            });
        }

        

        function clearCardPlaybackIndicators() {
            document.querySelectorAll(".sequence-card").forEach((card) => {
                card.classList.remove("is-playing");
            });
            document.querySelectorAll(".sequence-play-indicator").forEach((indicator) => {
                indicator.classList.remove("is-playing");
                indicator.textContent = "Idle";
            });
            currentPlayingPartName = "";
            currentPlayingStepIndex = -1;
        }

        function updateCardPlaybackIndicator(partName, stepIndex, totalSteps, note) {
            currentPlayingPartName = partName;
            currentPlayingStepIndex = stepIndex;

            document.querySelectorAll(".sequence-card").forEach((card) => {
                const isCurrent = card.getAttribute("data-part-name") === partName;
                card.classList.toggle("is-playing", isCurrent);
            });

            document.querySelectorAll(".sequence-play-indicator").forEach((indicator) => {
                const isCurrent = indicator.getAttribute("data-play-indicator") === partName;
                indicator.classList.toggle("is-playing", isCurrent);
                indicator.textContent = isCurrent
                    ? `Playing step ${stepIndex}/${totalSteps} · ${noteName(note)}`
                    : "Idle";
            });
        }

        function playPartFromCard(partName) {
            const textArea = document.querySelector(`[data-sequence-text="${CSS.escape(partName)}"]`);
            if (!textArea) return;
            const sequence = parseSequenceText(textArea.value);
            if (sequence.length === 0) {
                setStatus(`No steps to play for ${partName}.`, "error");
                return;
            }
            startPlaybackQueue([{ name: partName, sequence }], `Part armed: ${partName}`);
        }

        function renderSequenceEditors() {
            const structure = songStructures[currentStructure];
            editorsContainer.innerHTML = "";

            structure.parts.forEach((part) => {
                const sequence = generatedSequences[part.name] || [];
                const card = document.createElement("div");
                card.className = "sequence-card";
                card.setAttribute("data-part-name", part.name);

                const text = sequenceToText(sequence);
                card.innerHTML = `
                    <div class="sequence-card-head">
                        <h4 class="sequence-card-title">${part.name}</h4>
                        <span class="sequence-meta">${sequence.length} steps</span>
                    </div>
                    <div class="sequence-play-indicator" data-play-indicator="${part.name}">Idle</div>
                    <textarea class="sequence-text" data-sequence-text="${part.name}" aria-label="Sequence ${part.name}">${text}</textarea>
                    <div class="sequence-help">Editable: use MIDI notes (e.g. 60 62 64) and "-" for rest.</div>
                    <div class="button-grid-2" style="margin-top:0.45rem;">
                        <button type="button" data-play-part="${part.name}">Play ${part.name}</button>
                        <button type="button" data-refresh-part="${part.name}">Apply Text</button>
                    </div>
                `;
                editorsContainer.appendChild(card);
            });

            editorsContainer.querySelectorAll("[data-play-part]").forEach((btn) => {
                btn.addEventListener("click", () => {
                    playPartFromCard(btn.getAttribute("data-play-part"));
                });
            });

            editorsContainer.querySelectorAll("[data-refresh-part]").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const partName = btn.getAttribute("data-refresh-part");
                    const textArea = document.querySelector(`[data-sequence-text="${CSS.escape(partName)}"]`);
                    if (!textArea) return;
                    generatedSequences[partName] = parseSequenceText(textArea.value);
                    renderSequenceEditors();
                    setStatus(`Sequence updated for ${partName}.`, "ok");
                });
            });

            if (currentPlayingPartName && currentPlayingStepIndex >= 0) {
                const currentPart = playbackQueue.find((part) => part.name === currentPlayingPartName);
                if (currentPart) {
                    const activeStep = currentPart.sequence[currentPlayingStepIndex];
                    if (activeStep) {
                        updateCardPlaybackIndicator(
                            currentPlayingPartName,
                            currentPlayingStepIndex + 1,
                            currentPart.sequence.length,
                            activeStep.note
                        );
                    }
                }
            }
        }

        function generateAllSequences() {
            const root = Number.parseInt(document.getElementById("sequence-root").value, 10);
            const scale = document.getElementById("sequence-scale").value;
            const maxSteps = Number.parseInt(document.getElementById("max-steps").value, 10);
            const density = Number.parseInt(document.getElementById("sequence-density").value, 10);
            const structure = songStructures[currentStructure];

            generatedSequences = {};
            structure.parts.forEach((part) => {
                const steps = Math.min(part.steps, maxSteps);
                const partDensity = Math.max(1, Math.min(8, Math.round((part.density + density) / 2)));
                generatedSequences[part.name] = generateSequenceForPart(steps, root, scale, partDensity);
            });

            renderSequenceEditors();
            
            setStatus(`Generated ${structure.parts.length} part sequences (${structure.name}).`, "ok");
        }

        function getSongQueueFromEditors() {
            const structure = songStructures[currentStructure];
            const queue = [];

            structure.parts.forEach((part) => {
                const textArea = document.querySelector(`[data-sequence-text="${CSS.escape(part.name)}"]`);
                const sequence = textArea ? parseSequenceText(textArea.value) : [];
                if (sequence.length > 0) {
                    queue.push({ name: part.name, sequence });
                }
            });

            return queue;
        }

        function startClockOut(sendTransportStart = false) {
            if (sequenceClockTimer || getClockMode() !== "out") return;
            if (!sequenceAudioCtx || sequenceAudioCtx.state === "closed") {
                sequenceAudioCtx = new AudioContext();
            }
            if (sendTransportStart) {
                sendMidiStart();
            }
            nextClockTickTime = sequenceAudioCtx.currentTime;
            scheduleClockOut();
        }

        function scheduleClockOut() {
            if (!sequenceAudioCtx || getClockMode() !== "out") return;

            const tempo = Number.parseInt(sequenceTempoInput.value, 10);
            const tickDuration = 60 / tempo / 24;
            const lookAhead = 0.025;

            while (nextClockTickTime < sequenceAudioCtx.currentTime + lookAhead) {
                sendMidiClock();
                nextClockTickTime += tickDuration;
            }

            const msToNext = (nextClockTickTime - sequenceAudioCtx.currentTime) * 1000;
            sequenceClockTimer = setTimeout(scheduleClockOut, Math.max(1, msToNext - 4));
        }

        function stopClockOut(sendTransportStop = false) {
            if (sequenceClockTimer) {
                clearTimeout(sequenceClockTimer);
                sequenceClockTimer = null;
            }
            if (sendTransportStop && getClockMode() === "out") {
                sendMidiStop();
            }
            if (sequenceAudioCtx) {
                sequenceAudioCtx.close();
                sequenceAudioCtx = null;
            }
        }

        function restartClockOutIfNeeded() {
            if (!sequenceIsPlaying || getClockMode() !== "out") return;
            stopClockOut(false);
            startClockOut(false);
        }

        function getCurrentStep() {
            const part = playbackQueue[playbackPartIndex];
            if (!part) return null;
            return part.sequence[playbackStepIndex] || null;
        }

        function advancePlaybackPosition() {
            playbackStepIndex += 1;
            const currentPart = playbackQueue[playbackPartIndex];
            if (!currentPart) return false;

            if (playbackStepIndex >= currentPart.sequence.length) {
                playbackPartIndex += 1;
                playbackStepIndex = 0;

                if (playbackPartIndex >= playbackQueue.length) {
                    return false;
                }
            }
            return true;
        }

        function playCurrentStepAndAdvance() {
            const part = playbackQueue[playbackPartIndex];
            const step = getCurrentStep();
            if (!part || !step) {
                stopPlayback();
                return;
            }

            if (activeSequenceNote !== null) {
                sendNoteOff(activeSequenceNote);
                activeSequenceNote = null;
            }

            if (step.gate) {
                sendNoteOn(step.note, step.velocity);
                activeSequenceNote = step.note;
            }
            const stepNum = playbackStepIndex + 1;
            updateCardPlaybackIndicator(part.name, stepNum, part.sequence.length, step.note);
            setStatus(`Playing ${part.name} step ${stepNum}/${part.sequence.length} (${noteName(step.note)})`, "ok");

            const hasNext = advancePlaybackPosition();
            if (!hasNext) {
                stopPlayback();
            }
        }

        function playInternalLoop() {
            const tempo = Number.parseInt(sequenceTempoInput.value, 10);
            const stepMs = (60 / tempo / 2) * 1000;

            const tick = () => {
                if (!sequenceIsPlaying || getClockMode() === "in") return;
                playCurrentStepAndAdvance();
                if (sequenceIsPlaying) {
                    sequenceTimer = setTimeout(tick, Math.max(1, stepMs));
                }
            };

            tick();
        }

        function stopPlayback(sendTransportStop = true) {
            if (sequenceTimer) {
                clearTimeout(sequenceTimer);
                sequenceTimer = null;
            }
            stopClockOut(sendTransportStop);
            if (activeSequenceNote !== null) {
                sendNoteOff(activeSequenceNote);
                activeSequenceNote = null;
            }

            sequenceArmed = false;
            sequenceIsPlaying = false;
            playbackQueue = [];
            playbackPartIndex = 0;
            playbackStepIndex = 0;
            externalClockTickCount = 0;
            clearCardPlaybackIndicators();
            setStatus("Stopped.", "ok");
        }

        function startPlaybackQueue(queue, armMessage) {
            if (!Array.isArray(queue) || queue.length === 0) {
                setStatus("No sequence data to play.", "error");
                return;
            }

            stopPlayback(false);
            playbackQueue = queue;
            playbackPartIndex = 0;
            playbackStepIndex = 0;
            externalClockTickCount = 0;
            sequenceArmed = true;

            if (getClockMode() === "in") {
                sequenceIsPlaying = false;
                setStatus(armMessage || "Armed: waiting for MIDI Start...", "ok");
                return;
            }

            sequenceIsPlaying = true;
            if (getClockMode() === "out") {
                startClockOut(true);
            }
            playInternalLoop();
        }

        function onExternalMidiStart() {
            if (getClockMode() !== "in") return;
            if (!sequenceArmed || playbackQueue.length === 0) return;

            sequenceIsPlaying = true;
            playbackPartIndex = 0;
            playbackStepIndex = 0;
            externalClockTickCount = 0;
            playCurrentStepAndAdvance();
        }

        function onExternalMidiClock() {
            if (getClockMode() !== "in") return;
            blinkClockModeSignal();
            if (!sequenceArmed || !sequenceIsPlaying || playbackQueue.length === 0) return;

            externalClockTickCount += 1;
            if (externalClockTickCount < midiClockTicksPerStep) return;

            externalClockTickCount = 0;
            playCurrentStepAndAdvance();
        }

        async function initMidi() {
            if (!navigator.requestMIDIAccess) {
                setStatus("WebMIDI is not supported in this browser.", "error");
                return;
            }

            try {
                midi = await navigator.requestMIDIAccess();
                midiInputs = Array.from(midi.inputs.values());
                midiOutputs = Array.from(midi.outputs.values());

                outputSelect.innerHTML = "";
                if (midiOutputs.length === 0) {
                    setStatus("No MIDI outputs detected.", "error");
                } else {
                    midiOutputs.forEach((output, index) => {
                        const option = document.createElement("option");
                        option.value = String(index);
                        option.textContent = output.name;
                        outputSelect.appendChild(option);
                    });
                    midiOutput = midiOutputs[0];
                    setStatus(`MIDI ready. Output: ${midiOutput.name}`, "ok");
                }

                outputSelect.addEventListener("change", (event) => {
                    const idx = Number.parseInt(event.target.value, 10);
                    midiOutput = midiOutputs[idx] || null;
                    if (midiOutput) {
                        setStatus(`MIDI output changed: ${midiOutput.name}`, "ok");
                    }
                });

                channelSelect.addEventListener("change", (event) => {
                    midiChannel = Math.max(1, Math.min(16, Number.parseInt(event.target.value, 10) || 1));
                });

                midiInputs.forEach((input) => {
                    input.addEventListener("midimessage", (message) => {
                        const [status] = message.data;
                        if (status === 0xFA) {
                            onExternalMidiStart();
                        } else if (status === 0xFC) {
                            if (getClockMode() === "in") {
                                stopPlayback(false);
                            }
                        } else if (status === 0xF8) {
                            onExternalMidiClock();
                        }
                    });
                });
            } catch (error) {
                setStatus(`MIDI error: ${error.message}`, "error");
            }
        }

        function exportSequences() {
            const structure = songStructures[currentStructure];
            const sequences = structure.parts.map((part) => {
                const textArea = document.querySelector(`[data-sequence-text="${CSS.escape(part.name)}"]`);
                const sequence = textArea ? parseSequenceText(textArea.value) : [];
                return {
                    name: part.name,
                    sequence
                };
            });

            const data = {
                structure: currentStructure,
                sequences
            };

            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `song-sequences-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            setStatus("Sequences exported.", "ok");
        }

        function importSequencesFromFile(file) {
            if (!file) return;
            const reader = new FileReader();

            reader.onload = (event) => {
                try {
                    const data = JSON.parse(String(event.target.result || "{}"));
                    if (!data || typeof data !== "object") {
                        throw new Error("Invalid file format");
                    }

                    if (typeof data.structure === "string" && songStructures[data.structure]) {
                        currentStructure = data.structure;
                        document.querySelectorAll(".structure-preset").forEach((btn) => {
                            btn.classList.toggle("active", btn.dataset.structure === currentStructure);
                        });
                    }

                    generatedSequences = {};

                    if (Array.isArray(data.sequences)) {
                        data.sequences.forEach((item) => {
                            if (!item || typeof item.name !== "string") return;
                            const normalized = normalizeImportedSequence(item.sequence);
                            if (normalized.length > 0) {
                                generatedSequences[item.name] = normalized;
                            }
                        });
                    }

                    const structure = songStructures[currentStructure];
                    structure.parts.forEach((part) => {
                        if (!generatedSequences[part.name]) {
                            generatedSequences[part.name] = [];
                        }
                    });

                    renderSequenceEditors();
                    
                    setStatus("Sequences imported.", "ok");
                } catch (error) {
                    setStatus(`Import error: ${error.message}`, "error");
                }
            };

            reader.readAsText(file);
        }

        

        

        document.querySelectorAll(".structure-preset").forEach((btn) => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".structure-preset").forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                currentStructure = btn.dataset.structure;
                generateAllSequences();
            });
        });

        document.getElementById("generate-all-btn").addEventListener("click", generateAllSequences);
        document.getElementById("play-song-btn").addEventListener("click", () => {
            const queue = getSongQueueFromEditors();
            startPlaybackQueue(queue, "Song armed: waiting for MIDI Start...");
        });
        document.getElementById("stop-sequence-btn").addEventListener("click", () => stopPlayback(true));
        document.getElementById("export-btn").addEventListener("click", exportSequences);
        document.getElementById("import-btn").addEventListener("click", () => {
            document.getElementById("import-file").click();
        });
        document.getElementById("import-file").addEventListener("change", (event) => {
            if (event.target.files && event.target.files[0]) {
                importSequencesFromFile(event.target.files[0]);
            }
            event.target.value = "";
        });

        sequenceTempoInput.addEventListener("input", () => {
            updateTempoLabel();
            restartClockOutIfNeeded();
        });

        sequenceClockModeSelect.addEventListener("change", () => {
            stopPlayback(false);
            updateClockModeUi();
            if (getClockMode() === "in") {
                setStatus("Clock mode set to IN. Press Play to arm.", "ok");
            } else if (getClockMode() === "out") {
                setStatus("Clock mode set to OUT.", "ok");
            } else {
                setStatus("Clock mode set to OFF.", "ok");
            }
        });

        updateTempoLabel();
        updateClockModeUi();
        initMidi();
        generateAllSequences();
        renderSongParts();
    </script>
</body>
</html>
