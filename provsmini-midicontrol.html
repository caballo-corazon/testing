<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MIDI controller for Behringer ProVS Mini with randomizer and preset management.">
    <title>Behringer ProVS Mini - MIDI Control</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap");

        :root {
            --bg-1: #060c14;
            --bg-2: #0a121d;
            --panel: linear-gradient(160deg, #1a2331 0%, #151e2a 42%, #0f1622 100%);
            --panel-border: #3b4f68;
            --text: #d8e4f2;
            --muted: #8ea1b8;
            --accent: #3aa0ff;
            --accent-2: #1f73d2;
            --accent-soft: rgba(58, 160, 255, 0.2);
            --danger: #ff7f8e;
            --ok: #79e0a4;
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Barlow Condensed", "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--text);
            margin: 0;
            background: radial-gradient(900px 460px at 15% -10%, #17314f 0%, transparent 58%),
                        radial-gradient(900px 500px at 95% 10%, #0d2745 0%, transparent 52%),
                        linear-gradient(180deg, var(--bg-2), var(--bg-1));
            min-height: 100vh;
            line-height: 1.4;
        }

        .container {
            width: min(1100px, 100% - 2rem);
            margin: 1.5rem auto 2rem auto;
            padding: 1rem;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(transparent 97%, rgba(58, 160, 255, 0.1) 100%),
                repeating-linear-gradient(90deg, transparent 0 88px, rgba(58, 160, 255, 0.06) 88px 89px);
            opacity: 0.6;
        }

        h1 {
            margin-top: 0;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-wrap: balance;
            text-transform: uppercase;
            color: #e8f2ff;
            text-shadow: 0 0 12px rgba(58, 160, 255, 0.24);
            position: relative;
            z-index: 1;
        }

        .subtitle {
            margin-top: 0;
            color: var(--muted);
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            position: relative;
            z-index: 1;
        }

        .midi-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        select,
        button,
        input[type=file] {
            font: inherit;
        }

        select,
        button {
            border: 1px solid #3c536e;
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            background: linear-gradient(180deg, #243345 0%, #1a2736 100%);
            color: var(--text);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        button {
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 0 1px rgba(58, 160, 255, 0.25), 0 6px 16px rgba(0, 0, 0, 0.35);
            border-color: #5baeff;
        }

        button:focus-visible,
        select:focus-visible,
        input[type=range]:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .status {
            min-height: 1.5rem;
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .status.error {
            color: var(--danger);
            font-weight: 600;
        }

        .status.ok {
            color: var(--ok);
            font-weight: 600;
        }

        .preset-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .top-controls-box {
            border: 1px solid #355274;
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(23, 36, 51, 0.95), rgba(13, 21, 31, 0.94));
            padding: 0.8rem;
            box-shadow: inset 0 0 0 1px rgba(58, 160, 255, 0.07);
            position: relative;
            z-index: 1;
        }

        .top-controls-stack {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .top-controls-group {
            border: 1px solid #2f4a67;
            border-radius: 10px;
            background: linear-gradient(180deg, #1d2d40 0%, #162433 100%);
            padding: 0.65rem;
        }

        .top-controls-group h3 {
            margin: 0 0 0.55rem 0;
            font-size: 0.78rem;
            font-weight: 700;
            color: #b8d8ff;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .top-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            align-items: start;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .workspace-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            align-items: start;
            position: relative;
            z-index: 1;
        }

        .controls-panel-box,
        .performance-panel-box {
            border: 1px solid #355274;
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(23, 36, 51, 0.95), rgba(13, 21, 31, 0.94));
            padding: 0.8rem;
            box-shadow: inset 0 0 0 1px rgba(58, 160, 255, 0.07);
        }

        .panel-layout {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-template-areas:
                "general general"
                "osc osc"
                "envelope envelope"
                "lfo1 lfo2"
                "filter chorus";
            gap: 1rem;
            margin-top: 1rem;
            position: relative;
            z-index: 1;
        }

        .control-section,
        .top-controls-panel {
            border: 1px solid #355274;
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(23, 36, 51, 0.95), rgba(13, 21, 31, 0.94));
            padding: 0.75rem;
            box-shadow: inset 0 0 0 1px rgba(58, 160, 255, 0.07);
            position: relative;
        }

        .control-section::before,
        .top-controls-panel::before {
            content: "";
            position: absolute;
            left: 0.65rem;
            right: 0.65rem;
            top: 0.5rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(58, 160, 255, 0.65), transparent);
        }

        .control-section h3 {
            margin: 0 0 0.6rem 0;
            font-size: 0.85rem;
            font-weight: 700;
            color: #b8d8ff;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            text-shadow: 0 0 9px rgba(58, 160, 255, 0.18);
        }

        .top-controls-panel > .section-header h3 {
            margin: 0 0 0.6rem 0;
            font-size: 0.85rem;
            font-weight: 700;
            color: #b8d8ff;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            text-shadow: 0 0 9px rgba(58, 160, 255, 0.18);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
        }

        .section-header h3 {
            margin: 0;
        }

        .section-collapse-btn {
            margin-left: auto;
            padding: 0.2rem 0.45rem;
            font-size: 0.75rem;
            cursor: pointer;
            background: linear-gradient(180deg, #1f3042, #182637);
            border: 1px solid #3f5b78;
            border-radius: 6px;
            color: #cfe6ff;
            white-space: nowrap;
        }

        .section-collapse-btn:hover {
            background: linear-gradient(180deg, #2a3f55, #1f3347);
            border-color: #5a7a9a;
        }

        .control-section.is-collapsed > *:not(.section-header),
        .top-controls-panel.is-collapsed > *:not(.section-header) {
            display: none !important;
        }

        .section-lock-btn {
            margin-top: 0;
            margin-left: 0.1rem;
            white-space: nowrap;
        }

        .section-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.7rem;
        }

        .envelope-groups {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.7rem;
        }

        .envelope-subgroup {
            border: 1px solid #2f4a67;
            border-radius: 10px;
            background: linear-gradient(180deg, #1d2d40 0%, #162433 100%);
            padding: 0.55rem;
        }

        .envelope-subgroup h4 {
            margin: 0 0 0.45rem 0;
            font-size: 0.76rem;
            color: #9fc7ef;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .envelope-subgroup .section-controls {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
        }

        .control-section.lfo1 .section-controls,
        .control-section.lfo2 .section-controls {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .control-section.lfo1 .section-controls .lfo-waveform-control,
        .control-section.lfo2 .section-controls .lfo-waveform-control {
            grid-column: 1;
            grid-row: 1;
        }

        .control-section.lfo1 .section-controls .lfo-rate-control,
        .control-section.lfo2 .section-controls .lfo-rate-control {
            grid-column: 1;
            grid-row: 2;
            padding: 0.55rem 0.4rem;
        }

        .control-section.lfo1 .section-controls .lfo-amount-control,
        .control-section.lfo2 .section-controls .lfo-amount-control {
            grid-column: 2;
            grid-row: 2;
            padding: 0.55rem 0.4rem;
        }

        .control-section.lfo1 .section-controls .lfo-wave-preview,
        .control-section.lfo2 .section-controls .lfo-wave-preview {
            grid-column: 2;
            grid-row: 1;
            border: 1px solid #2f4a67;
            border-radius: 12px;
            background: linear-gradient(180deg, #213246 0%, #162433 100%);
            min-height: 114px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0.45rem;
            position: relative;
        }

        .lfo-wave-preview-label {
            font-size: 0.66rem;
            letter-spacing: 0.08em;
            color: #9ec8f3;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .lfo-wave-preview svg {
            width: 100%;
            height: 64px;
        }

        .lfo-wave-preview path {
            stroke: #5bb3ff;
            stroke-width: 2.4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px rgba(91, 179, 255, 0.55));
        }

        .control-section.lfo1 .section-controls .lfo-rate-control label,
        .control-section.lfo1 .section-controls .lfo-amount-control label,
        .control-section.lfo2 .section-controls .lfo-rate-control label,
        .control-section.lfo2 .section-controls .lfo-amount-control label {
            font-size: 0.78rem;
            min-height: 1.7rem;
        }

        .control-section.fx .section-controls {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .control-section.fx .section-controls .fx-type-control {
            grid-column: 1;
            grid-row: 1;
        }

        .control-section.fx .section-controls .fx-engine-description {
            grid-column: 2;
            grid-row: 1;
            border: 1px solid #2f4a67;
            border-radius: 12px;
            background: linear-gradient(180deg, #213246 0%, #162433 100%);
            min-height: 114px;
            padding: 0.6rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.35rem;
        }

        .control-section.fx .section-controls .fx-engine-description .fx-engine-title {
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            color: #9ec8f3;
            text-transform: uppercase;
        }

        .control-section.fx .section-controls .fx-engine-description .fx-engine-text {
            font-size: 1.0rem;
            line-height: 1.35;
            text-align: center;
            color: #d2e8ff;
            text-transform: uppercase;
        }

        .control-section.fx .section-controls .fx-rate-control {
            grid-column: 1;
            grid-row: 2;
        }

        .control-section.fx .section-controls .fx-depth-control {
            grid-column: 2;
            grid-row: 2;
        }

        .control-section .section-note {
            margin: -0.2rem 0 0.65rem 0;
            font-size: 0.74rem;
            color: #7fa5cc;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        .control-section.envelope { grid-area: envelope; }
        .control-section.general { grid-area: general; }
        .control-section.lfo1 { grid-area: lfo1; }
        .control-section.lfo2 { grid-area: lfo2; }
        .control-section.osc { grid-area: osc; }
        .control-section.filter { grid-area: filter; }
        .control-section.fx { grid-area: chorus; }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.35rem;
            padding: 0.75rem 0.5rem;
            border: 1px solid #2f4a67;
            border-radius: 12px;
            background: linear-gradient(180deg, #213246 0%, #162433 100%);
            position: relative;
        }

        .slider-wrapper::after {
            content: "";
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 8px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(58, 160, 255, 0.4), transparent);
        }

        .slider-wrapper.freq-mini {
            padding: 0.45rem 0.35rem;
            gap: 0.2rem;
        }

        .slider-wrapper.freq-mini label {
            font-size: 0.7rem;
            min-height: 1.4rem;
        }

        .slider-wrapper label {
            font-size: 0.84rem;
            min-height: 2.2rem;
            letter-spacing: 0.03em;
            color: #d7e6f7;
            text-transform: uppercase;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 5px;
            background: linear-gradient(90deg, #1f334a, #3f6f9f, #1f334a);
            border-radius: 999px;
            border: 1px solid #2e4b68;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-top: -5px;
            background: #8cc7ff;
            border: 1px solid #edf6ff;
            box-shadow: 0 0 0 3px rgba(58, 160, 255, 0.2);
        }

        .keyboard-label {
            margin: 0 0 0.45rem 0;
            color: #b8d8ff;
            font-size: 0.85rem;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .keyboard {
            position: relative;
            width: 100%;
            height: 176px;
            padding: 0.35rem 0.2rem 0.2rem 0.2rem;
            border: 1px solid #355274;
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(23, 36, 51, 0.95), rgba(13, 21, 31, 0.94));
            box-shadow: inset 0 0 0 1px rgba(58, 160, 255, 0.07);
            overflow: hidden;
            z-index: 1;
        }

        .keyboard-inner {
            position: relative;
            width: 100%;
            height: 146px;
        }

        .white-key,
        .black-key {
            position: absolute;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.03em;
            box-sizing: border-box;
        }

        .white-key {
            width: calc(100% / 15);
            height: 146px;
            bottom: 0;
            border: 1px solid #0f1725;
            border-radius: 0 0 7px 7px;
            background: linear-gradient(180deg, #f7f8fb, #cfd5df);
            color: #1a2535;
            padding-bottom: 0.35rem;
            box-shadow: inset 0 -14px 18px rgba(0, 0, 0, 0.16);
        }

        .black-key {
            width: calc((100% / 15) * 0.62);
            height: 88px;
            top: 0;
            border: 1px solid #0c121d;
            border-radius: 0 0 6px 6px;
            background: linear-gradient(180deg, #101826, #050a12);
            color: #e7f2ff;
            z-index: 3;
            padding-bottom: 0.25rem;
            box-shadow: inset 0 -10px 16px rgba(255, 255, 255, 0.05), 0 0 0 1px rgba(58, 160, 255, 0.04);
        }

        .white-key:active,
        .black-key:active {
            transform: translateY(1px);
        }

        .white-key.active {
            background: linear-gradient(180deg, #d7edff, #9ec8f3);
            border-color: #69b4ff;
        }

        .black-key.active {
            background: linear-gradient(180deg, #284565, #162233);
            border-color: #69b4ff;
        }

        .white-key span,
        .black-key span {
            font-size: 0.72rem;
            margin-bottom: 0.25rem;
        }

        .performance-zone {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
            align-items: start;
            margin-top: 0;
            position: relative;
            z-index: 1;
        }

        .performance-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            margin-bottom: 0.7rem;
        }

        .performance-header h3 {
            margin: 0;
            font-size: 0.85rem;
            font-weight: 700;
            color: #b8d8ff;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            text-shadow: 0 0 9px rgba(58, 160, 255, 0.18);
        }

        .performance-title-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
        }

        .performance-header-actions {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            min-width: 0;
        }

        .performance-panel-box.is-collapsed .performance-zone {
            display: none;
        }

        .status.inline-status {
            margin: 0;
            min-height: auto;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        .sequence-panel {
            border: 1px solid #355274;
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(23, 36, 51, 0.95), rgba(13, 21, 31, 0.94));
            padding: 0.85rem;
            box-shadow: inset 0 0 0 1px rgba(58, 160, 255, 0.07);
        }

        .sequence-panel h3 {
            margin: 0 0 0.5rem 0;
            font-size: 0.85rem;
            font-weight: 700;
            color: #b8d8ff;
            letter-spacing: 0.11em;
            text-transform: uppercase;
        }

        .sequence-panel .section-note {
            margin: 0 0 0.7rem 0;
            font-size: 0.74rem;
            color: #7fa5cc;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        .sequence-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.7rem;
        }

        .sequence-grid-wide {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.7rem;
            margin-top: 0.7rem;
        }

        .sequence-field {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sequence-field label {
            font-size: 0.72rem;
            color: #d7e6f7;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .tempo-bpm {
            color: #8cc7ff;
            font-weight: 700;
            margin-left: 0.35rem;
        }

        .sequence-field select,
        .sequence-field input {
            width: 100%;
        }

        .sequence-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .sequence-actions #generate-sequence-btn {
            grid-column: 1 / -1;
        }

        .sequence-actions #play-sequence-btn,
        .sequence-actions #stop-sequence-btn {
            width: 100%;
        }

        .sequence-toggle {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            margin-top: 0.65rem;
            color: #d7e6f7;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sequence-toggle input {
            accent-color: var(--accent);
        }

        .sequence-clock-mode-select {
            min-width: 152px;
            text-transform: uppercase;
            transition: box-shadow 0.12s ease, border-color 0.12s ease, background 0.12s ease;
        }

        .sequence-clock-mode-select.clock-signal-blink {
            border-color: #8cc7ff;
            box-shadow: 0 0 0 1px rgba(140, 199, 255, 0.45), 0 0 12px rgba(58, 160, 255, 0.35);
            background: linear-gradient(180deg, #2b4663 0%, #20344a 100%);
        }

        .sequence-toggle-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.85rem;
            align-items: center;
            margin-top: 0.65rem;
        }

        .sequence-tempo-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
        }

        .sequence-tempo-toggle input[type=range] {
            width: 148px;
        }

        .sequence-tempo-toggle.is-hidden {
            display: none;
        }

        .sequence-display {
            margin-top: 0.8rem;
            padding: 0.65rem;
            border: 1px solid #2f4a67;
            border-radius: 10px;
            background: linear-gradient(180deg, #213246 0%, #162433 100%);
            color: #d2e8ff;
            min-height: 72px;
            font-size: 0.85rem;
            line-height: 1.35;
            word-break: break-word;
        }

        .sequence-display.sequence-display-header {
            margin-top: 0;
            min-height: auto;
            padding: 0.35rem 0.55rem;
            font-size: 0.78rem;
            line-height: 1.2;
            max-width: min(52vw, 520px);
            white-space: nowrap;
            overflow: hidden;

            }

            function setupSectionCollapse(section) {
                const sectionClass = section.dataset.collapseKey || Array.from(section.classList).find(c => 
                    ['general', 'osc', 'envelope', 'lfo1', 'lfo2', 'filter', 'fx'].includes(c)
                );
                if (!sectionClass) return;

                const header = section.querySelector('.section-header');
                if (!header) return;

                const collapseBtn = document.createElement('button');
                collapseBtn.classList.add('section-collapse-btn');
                collapseBtn.type = 'button';
                collapseBtn.textContent = 'Hide';
                collapseBtn.setAttribute('aria-expanded', 'true');

                collapseBtn.addEventListener('click', () => {
                    section.classList.toggle('is-collapsed');
                    const isCollapsed = section.classList.contains('is-collapsed');
                    collapseBtn.textContent = isCollapsed ? 'Show' : 'Hide';
                    collapseBtn.setAttribute('aria-expanded', String(!isCollapsed));
                });

                header.appendChild(collapseBtn);
            }

            function updatePerformanceToggle() {
                const isCollapsed = performancePanel.classList.contains("is-collapsed");
                performanceToggleBtn.textContent = isCollapsed ? "Show" : "Hide";
                performanceToggleBtn.setAttribute("aria-expanded", String(!isCollapsed));
                syncCollapsedSequenceDisplay();
            }

            performanceToggleBtn.addEventListener("click", () => {
                performancePanel.classList.toggle("is-collapsed");
                updatePerformanceToggle();
            });

            updatePerformanceToggle();

            function setStatus(message, tone = "") {
                statusEl.textContent = message;
                statusEl.className = `status${tone ? ` ${tone}` : ""}`;
            }

            function describeMidiMessage(type, status) {
                if (status === 250 || status === 0xFA) return "Start";
                if (status === 252 || status === 0xFC) return "Stop";
                if (status === 248 || status === 0xF8) return "Clock";
                if (status === 254 || status === 0xFE) return "Active Sensing";
                return type;
            }

            function logSentMessage(type, status, data1, data2, controlName = null, channel = null) {
                const timestamp = new Date().toLocaleTimeString();
                const resolvedType = describeMidiMessage(type, status);
                const resolvedChannel = channel ?? (status < 0xF0 ? (status & 0x0F) + 1 : "SYS");
                let message = `[${timestamp}] [SEND] [Channel: ${resolvedChannel}] ${resolvedType}: status=${status}, data1=${data1}`;
                if (data2 !== undefined) message += `, Value: ${data2}`;
                if (controlName) message += ` (${controlName})`;
                console.log(message);
            }

            function logReceivedMessage(type, status, data1, data2, controlName = null, channel = null) {
                const timestamp = new Date().toLocaleTimeString();
                const resolvedType = describeMidiMessage(type, status);
                const resolvedChannel = channel ?? (status < 0xF0 ? (status & 0x0F) + 1 : "SYS");
                let message = `[${timestamp}] [RECV] [Channel: ${resolvedChannel}] ${resolvedType}: status=${status}, data1=${data1}`;
                if (data2 !== undefined) message += `, Value: ${data2}`;
                if (controlName) message += ` (${controlName})`;
                console.log(message);
            }

            // Maps a displayed value (0-max) to MIDI value (0-127)
            function toMidiValue(displayValue, max) {
                return Math.round((displayValue / max) * 127);
            }

            // Maps a MIDI value (0-127) to displayed value (0-max)
            function toDisplayValue(midiValue, max) {
                return Math.round((midiValue / 127) * max);
            }

            const midi = await navigator.requestMIDIAccess();
            const outputSelect = document.getElementById("midi-output");
            const channelSelect = document.getElementById("midi-channel");
            const inputs = Array.from(midi.inputs.values());
            const outputs = Array.from(midi.outputs.values());

            if (outputs.length === 0) {
                setStatus("No MIDI outputs detected.", "error");
                alert("No MIDI output devices detected.");
                return;
            }

            outputs.forEach((output, index) => {
                const option = document.createElement("option");
                option.value = index;
                option.textContent = output.name;
                outputSelect.appendChild(option);
            });

            let midiOutput = outputs[0];
            let midiChannel = parseInt(channelSelect.value, 10);
            setStatus(`Active MIDI output: ${midiOutput.name}`, "ok");
            outputSelect.addEventListener("change", (event) => {
                midiOutput = outputs[event.target.value];
                console.log(`Changed output device to: ${midiOutput.name}`);
                setStatus(`Active MIDI output: ${midiOutput.name}`, "ok");
            });
            channelSelect.addEventListener("change", (event) => {
                midiChannel = Math.min(16, Math.max(1, parseInt(event.target.value, 10) || 1));
                console.log(`Changed MIDI channel to: ${midiChannel}`);
            });

            function channelStatus(baseStatus) {
                return baseStatus + (midiChannel - 1);
            }

            function sendCC(controller, displayValue, max) {
                if (!midiOutput) return;
                const midiValue = toMidiValue(displayValue, max);
                const status = channelStatus(0xB0);
                const message = [status, controller, midiValue];
                midiOutput.send(message);
                const controlName = getCCName(controller);
                logSentMessage("CC", status, controller, midiValue, controlName);
            }

            function sendNoteOn(note, velocity) {
                if (!midiOutput) return;
                const status = channelStatus(144);
                const message = [status, note, velocity];
                midiOutput.send(message);
                logSentMessage("Note On", status, note, velocity);
            }

            function sendNoteOff(note) {
                if (!midiOutput) return;
                const status = channelStatus(128);
                const message = [status, note, 0];
                midiOutput.send(message);
                logSentMessage("Note Off", status, note, 0);

            // Keep preset-name hashing tied to the actual control definitions.
            const presetNameControlOrder = controls.map(({ cc }) => cc);

            // Generate an 8-character name based on all control values
            function generatePresetName() {
                // Create a hash from all control values
                let hash = 0;
                presetNameControlOrder.forEach((cc) => {
                    const slider = document.querySelector(`[data-cc="${cc}"]`);
                    const value = slider ? parseInt(slider.value) : 0;
                    hash = (hash << 5) - hash + value;
                    hash |= 0; // Convert to 32bit integer
                });

                // Convert hash to a consistent 8-character name
                let name = '';
                for (let i = 0; i < 8; i++) {
                    // Use absolute value and modulo to get a consistent index
                    const charIndex = Math.abs(hash + i * 2654435761) % nameChars.length;
                    name += nameChars[charIndex];
                }

                return name;
            }

            function saveCurrentPreset() {
                const preset = {
                    name: document.getElementById('preset-name').textContent,
                    controls: [],
                    values: {},
                    timestamp: new Date().toISOString()
                };

                controls.forEach(({ cc, name }) => {
                    const slider = document.querySelector(`[data-cc="${cc}"]`);
                    const value = parseInt(slider.value, 10);

                    preset.values[cc] = value;
                    // Add to controls array (human-readable)
                    preset.controls.push({
                       cc: cc,
                       name: name,
                       value: value,
                       min: slider.min,
                       max: slider.max
                       });
                });

                const presetJson = JSON.stringify(preset, null, 2);
                const blob = new Blob([presetJson], { type: 'application/json' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = `CC_${preset.name.replace(/[^a-zA-Z]/g, '_')}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                console.log(`Preset saved: ${preset.name}`);
            }

            function loadPresetFromFile(file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const preset = JSON.parse(event.target.result);
                        if (!preset || typeof preset !== "object") {
                            throw new Error("Invalid preset format");
                        }

                        const loadedValues = (preset.values && typeof preset.values === "object")
                            ? preset.values
                            : Array.isArray(preset.controls)
                                ? Object.fromEntries(
                                    preset.controls
                                        .filter((item) => item && item.cc !== undefined && item.value !== undefined)
                                        .map((item) => [item.cc, item.value])
                                )
                                : null;

                        if (!loadedValues) {
                            throw new Error("Invalid preset format");
                        }

                        // Apply the preset values
                        let appliedCount = 0;
                        Object.entries(loadedValues).forEach(([ccKey, rawValue]) => {
                            const cc = parseInt(ccKey, 10);
                            const control = controlsByCc.get(cc);
                            if (!control) return;

                            const slider = document.querySelector(`[data-cc="${cc}"]`);
                            if (!slider) return;

                            let displayValue = Number(rawValue);
                            if (!Number.isFinite(displayValue)) return;

                            // Backward compatibility: if preset stores raw MIDI (0-127) for lower-range controls.
                            if (displayValue > control.max && displayValue <= 127 && control.max < 127) {
                                displayValue = toDisplayValue(displayValue, control.max);
                            }

                            displayValue = Math.min(control.max, Math.max(control.min, Math.round(displayValue)));
                            slider.value = String(displayValue);

                            updateControlDisplay(cc, displayValue, control);
                            sendCC(cc, displayValue, control.max);
                            appliedCount += 1;
                        });

                        if (appliedCount === 0) {
                            throw new Error("No compatible control values found in preset");
                        }

                        // Update the preset name display
                        const presetName = preset.name || "Preset loaded";
                        document.getElementById('preset-name').textContent = presetName;
                        refreshPresetName();
                        console.log(`Preset loaded: ${presetName} (${appliedCount} controls)`);
                    } catch (error) {
                        console.error("Error loading preset:", error);
                        alert("Error loading preset file. Please check the file format.");
                    }
                };
                reader.readAsText(file);
            }

            function getLfoWavePath(value) {
                const paths = {
                    0: "M4 32 L24 8 L44 56 L64 8 L84 56 L104 8",      // Triangle
                    1: "M4 56 L4 8 L24 8 L24 56 L44 56 L44 8 L64 8 L64 56 L84 56 L84 8 L104 8", // Square
                    2: "M4 56 L24 8 L24 56 L44 8 L44 56 L64 8 L64 56 L84 8 L84 56 L104 8", // Sawtooth
                    3: "M4 8 L24 56 L24 8 L44 56 L44 8 L64 56 L64 8 L84 56 L84 8 L104 56", // Ramp
                    4: "M4 20 L16 20 L16 44 L30 44 L30 14 L46 14 L46 36 L62 36 L62 24 L78 24 L78 50 L94 50 L94 18 L104 18" // S&H
                };
                return paths[value] || paths[0];
            }

            function noteName(note) {
                const names = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
                return `${names[note % 12]}${Math.floor(note / 12) - 1}`;
            }

            function sendMidiClock() {
                if (!midiOutput) return;
                midiOutput.send([0xF8]);
                blinkClockModeSignal();
            }

            function sendMidiStart() {
                if (!midiOutput) return;
                midiOutput.send([0xFA]);
                logSentMessage("Transport", 250, 0);
            }

            function sendMidiStop() {
                if (!midiOutput) return;
                midiOutput.send([0xFC]);
                logSentMessage("Transport", 252, 0);
            }

            function startClockOut(sendTransportStart = false) {
                if (sequenceClockTimer || getClockMode() !== "out") return;
                if (!sequenceAudioCtx || sequenceAudioCtx.state === "closed") {
                    sequenceAudioCtx = new AudioContext();
                }
                if (sendTransportStart) {
                    sendMidiStart();
                }
                nextClockTickTime = sequenceAudioCtx.currentTime;
                scheduleClockOut();
            }

            function scheduleClockOut() {
                if (!sequenceAudioCtx || getClockMode() !== "out") return;

                const tempo = parseInt(sequenceTempoInput.value, 10);
                const tickDuration = 60 / tempo / 24;
                const lookAhead = 0.025;

                while (nextClockTickTime < sequenceAudioCtx.currentTime + lookAhead) {
                    sendMidiClock();
                    nextClockTickTime += tickDuration;
                }

                const msToNext = (nextClockTickTime - sequenceAudioCtx.currentTime) * 1000;
                sequenceClockTimer = setTimeout(scheduleClockOut, Math.max(1, msToNext - 4));
            }

            function stopClockOut(sendTransportStop = false) {
                if (sequenceClockTimer) {
                    clearTimeout(sequenceClockTimer);
                    sequenceClockTimer = null;
                }
                if (sendTransportStop && getClockMode() === "out") {
                    sendMidiStop();
                }
                if (sequenceAudioCtx) {
                    sequenceAudioCtx.close();
                    sequenceAudioCtx = null;
                }
            }

            function restartClockOutIfNeeded() {
                if (!sequenceIsPlaying || getClockMode() !== "out") return;
                stopClockOut(false);
                startClockOut(false);
            }

            function getScaleIntervals(scale) {
                const scales = {
                    major: [0, 2, 4, 5, 7, 9, 11],
                    minor: [0, 2, 3, 5, 7, 8, 10],
                    pentatonic: [0, 3, 5, 7, 10],
                    dorian: [0, 2, 3, 5, 7, 9, 10]
                };
                return scales[scale] || scales.minor;
            }

            function buildMusicalSequence() {
                const steps = parseInt(sequenceLengthSelect.value, 10);
                const root = parseInt(sequenceRootSelect.value, 10);
                const scale = sequenceScaleSelect.value;
                const density = parseInt(sequenceDensityInput.value, 10);
                const intervals = getScaleIntervals(scale);

                generatedSequence = Array.from({ length: steps }, (_, index) => {
                    const useNote = Math.floor(Math.random() * 8) < density;
                    const degree = intervals[Math.floor(Math.random() * intervals.length)];
                    const octaveShift = index % 8 === 7 ? 12 : (Math.random() > 0.8 ? 12 : 0);
                    const note = useNote ? root + degree + octaveShift : root + intervals[0];
                    const velocity = Math.floor(88 + Math.random() * 32);
                    return {
                        note: Math.max(36, Math.min(96, note)),
                        velocity,
                        gate: Math.random() > 0.2
                    };
                });

                renderSequence(generatedSequence);
                console.log(`Generated musical sequence (${scale}, root ${noteName(root)})`);
            }

            function renderSequence(sequence) {
                setSequenceDisplayHtml(`<strong>Sequence:</strong> ${sequence.map((step, index) => `${index + 1}:${noteName(step.note)}`).join(" · ")}`);
            }

            function generateSequence() {
                buildMusicalSequence();
            }

            function renderPlayingStep(index) {
                const current = generatedSequence[index];
                setSequenceDisplayHtml(`<strong>Playing:</strong> ${noteName(current.note)} <span style="color:#7fa5cc">(${index + 1}/${generatedSequence.length})</span><br>${generatedSequence.map((step, stepIndex) => stepIndex === index ? `<span style="color:#8cc7ff">${noteName(step.note)}</span>` : noteName(step.note)).join(" · ")}`);
            }

            function playSequenceStep(index) {
                const step = generatedSequence[index];
                if (!step) return;

                if (activeSequenceNote !== null) {
                    sendNoteOff(activeSequenceNote);
                    activeSequenceNote = null;
                }

                if (step.gate) {
                    sendNoteOn(step.note, step.velocity);
                    activeSequenceNote = step.note;
                }

                renderPlayingStep(index);
            }

            function onExternalMidiStart() {
                if (getClockMode() !== "in") {
                    return;
                }
                if (!sequenceArmed) {
                    return;
                }

                if (generatedSequence.length === 0) {
                    buildMusicalSequence();
                }

                if (generatedSequence.length === 0) return;

                sequenceIsPlaying = true;
                sequenceStepIndex = 0;
                externalClockTickCount = 0;
                syncCollapsedSequenceDisplay();
                playSequenceStep(sequenceStepIndex);
            }

            function stopSequence(sendTransportStop = true) {
                if (sequenceTimer) {
                    clearTimeout(sequenceTimer);
                    sequenceTimer = null;
                }
                stopClockOut(sendTransportStop);
                if (activeSequenceNote !== null) {
                    sendNoteOff(activeSequenceNote);
                    activeSequenceNote = null;
                }
                sequenceArmed = false;
                sequenceIsPlaying = false;
                sequenceStepIndex = 0;
                externalClockTickCount = 0;
                syncCollapsedSequenceDisplay();
                if (generatedSequence.length > 0) {
                    renderSequence(generatedSequence);
                } else {
                    setSequenceDisplayText("No sequence generated yet.");
                }
            }

            function playInternalSequence() {
                const tempo = parseInt(sequenceTempoInput.value, 10);
                const stepSec = (60 / tempo) / 2;
                const swingRatio = parseInt(sequenceSwingInput.value, 10) / 100;
                const swingSec = stepSec * swingRatio;

                let nextStepTime = sequenceAudioCtx ? sequenceAudioCtx.currentTime : performance.now() / 1000;

                const playStep = () => {
                    if (!sequenceIsPlaying || getClockMode() === "in") return;

                    if (sequenceStepIndex >= generatedSequence.length) {
                        if (sequenceLoopInput.checked) {
                            sequenceStepIndex = 0;
                        } else {
                            stopSequence(getClockMode() === "out");
                            return;
                        }
                    }

                    playSequenceStep(sequenceStepIndex);
                    nextStepTime += stepSec + (sequenceStepIndex % 2 !== 0 ? swingSec : 0);
                    sequenceStepIndex += 1;

                    const nowSec = sequenceAudioCtx ? sequenceAudioCtx.currentTime : performance.now() / 1000;
                    const msToNext = (nextStepTime - nowSec) * 1000;
                    sequenceTimer = setTimeout(playStep, Math.max(1, msToNext - 4));
                };

                playStep();
            }

            function playSequence() {
                if (generatedSequence.length === 0) {
                    buildMusicalSequence();
                }

                if (generatedSequence.length === 0) return;

                stopSequence(false);
                sequenceArmed = true;
                sequenceStepIndex = 0;
                externalClockTickCount = 0;

                if (getClockMode() === "in") {
                    sequenceIsPlaying = false;
                    setSequenceDisplayText("Armed: waiting for MIDI Start...");
                    return;
                }

                sequenceIsPlaying = true;
                syncCollapsedSequenceDisplay();

                if (getClockMode() === "out") {
                    startClockOut(true);
                }

                playInternalSequence();
            }

            function onExternalMidiClock() {
                if (getClockMode() !== "in") return;
                blinkClockModeSignal();
                if (!sequenceArmed || !sequenceIsPlaying || generatedSequence.length === 0) return;

                externalClockTickCount += 1;
                if (externalClockTickCount < midiClockTicksPerStep) {
                    return;
                }

                externalClockTickCount = 0;
                sequenceStepIndex += 1;

                if (sequenceStepIndex >= generatedSequence.length) {
                    if (sequenceLoopInput.checked) {
                        sequenceStepIndex = 0;
                    } else {
                        stopSequence();
                        return;
                    }
                }

                playSequenceStep(sequenceStepIndex);
            }

            document.getElementById("generate-sequence-btn").addEventListener("click", generateSequence);
            document.getElementById("play-sequence-btn").addEventListener("click", playSequence);
            document.getElementById("stop-sequence-btn").addEventListener("click", stopSequence);

            // Generate random values (only for unlocked controls)
            function randomizeUnlockedControls() {
                console.log("Generating random values for unlocked controls");
                controls.forEach(({ cc, min, max, isVoiceWave, isLFO, isFXE }) => {
                    if (!lockedControls.has(cc)) {
                        const randomDisplayValue = Math.floor(Math.random() * (max - min + 1)) + min;
                        
                        // Update the slider with the display value
                        document.querySelector(`[data-cc="${cc}"]`).value = randomDisplayValue;

                        updateControlDisplay(cc, randomDisplayValue, { isVoiceWave, isLFO, isFXE });
                        
                        // Send the MIDI message with proper mapping
                        sendCC(cc, randomDisplayValue, max);
                    } else {
                        // For locked controls - send current slider value
                        const slider = document.querySelector(`[data-cc="${cc}"]`);
                        const currentValue = parseInt(slider.value, 10);
                        sendCC(cc, currentValue, max);
                        
                        // Log that we're sending the locked control's current value
                        const controlName = getCCName(cc);
                        console.log(`Sending locked control current value: ${controlName} (CC ${cc}) = ${currentValue}`);
                    }
                });
                // Update the preset name after randomization
                refreshPresetName();
            }

            document.getElementById("randomize-btn").addEventListener("click", randomizeUnlockedControls);

            // Create MIDI keyboard
            const keyboard = document.getElementById("keyboard");
            const keyboardInner = document.createElement("div");
            keyboardInner.className = "keyboard-inner";

            const keyboardNotes = Array.from({ length: 27 }, (_, index) => 53 + index);
            const blackPitchClasses = new Set([1, 3, 6, 8, 10]);
            const blackNotes = new Set(keyboardNotes.filter((note) => blackPitchClasses.has(note % 12)));
            const whiteNotes = keyboardNotes.filter((note) => !blackNotes.has(note));
            const whiteCount = whiteNotes.length;
            const whiteIndexByNote = new Map();
            whiteNotes.forEach((note, index) => {
                whiteIndexByNote.set(note, index);
            });
            let whiteIndex = 0;

            keyboardNotes.forEach((note) => {
                const isBlack = blackNotes.has(note);
                const key = document.createElement("div");
                key.className = isBlack ? "black-key" : "white-key";
                key.dataset.note = String(note);
                key.setAttribute("role", "button");
                key.setAttribute("tabindex", "0");
                key.setAttribute("aria-label", `MIDI note ${note}`);
                key.innerHTML = `<span>${noteName(note)}</span>`;

                const noteOn = () => {
                    key.classList.add("active");
                    sendNoteOn(note, 127);
                };

                const noteOff = () => {
                    key.classList.remove("active");
                    sendNoteOff(note);
                };

                key.addEventListener("mousedown", noteOn);
                key.addEventListener("mouseup", noteOff);
                key.addEventListener("mouseleave", noteOff);
                //key.addEventListener("mouseover", noteOn);
                key.addEventListener("touchstart", (event) => {
                    event.preventDefault();
                    noteOn();
                }, { passive: false });
                key.addEventListener("touchend", noteOff);
                key.addEventListener("keydown", (event) => {
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        noteOn();
                    }
                });
                key.addEventListener("keyup", (event) => {
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        noteOff();
                    }
                });

                if (isBlack) {
                    const leftWhiteNote = note - 1;
                    const leftWhiteIndex = whiteIndexByNote.get(leftWhiteNote);
                    const blackCenterOffset = 1 - (0.62 / 2);
                    key.style.left = `calc((100% / ${whiteCount}) * ${leftWhiteIndex + blackCenterOffset})`;
                } else {
                    key.style.left = `calc((100% / ${whiteCount}) * ${whiteIndex})`;
                    whiteIndex += 1;
                }

                keyboardInner.appendChild(key);
            });

            keyboard.appendChild(keyboardInner);

            // Listen for incoming MIDI messages
            inputs.forEach(input => {
                input.addEventListener("midimessage", (message) => {
                    const [status, data1, data2] = message.data;
                    const messageType = status & 0xF0;
                    const channel = status < 0xF0 ? (status & 0x0F) + 1 : null;

                    //logReceivedMessage("debug cc messages not arriving", status, data1, data2);
                    if (messageType === 0xB0) {  // CC message
                        const controlName = getCCName(data1);
                        logReceivedMessage("CC", status, data1, data2, controlName, channel);
                        const control = controls.find(c => c.cc === data1);
                        if (control) {
                            // Convert MIDI value (0-127) to display value (0-max)
                            const displayValue = toDisplayValue(data2, control.max);
                            
                            // Update the slider with the display value
                            document.querySelector(`[data-cc="${data1}"]`).value = displayValue;

                            updateControlDisplay(data1, displayValue, control);
                        }
                    } else if (messageType === 0x90 || messageType === 0x80) {  // Note On/Off
                        const type = messageType === 0x90 ? "Note On" : "Note Off";
                        logReceivedMessage(type, status, data1, data2, null, channel);
                    } else if (status === 0xFA) {
                        logReceivedMessage("Transport", status, data1, data2, null, channel);
                        onExternalMidiStart();
                    } else if (status === 0xFC) {
                        logReceivedMessage("Transport", status, data1, data2, null, channel);
                        if (getClockMode() === "in") {
                            stopSequence(false);
                        }
                    } else if (status === 0xF8) {
                        onExternalMidiClock();
                        logReceivedMessage("Clock", status, data1, data2, null, channel);
                    } else {
                        //ignore 254 (Active Sensing) and 248 (Timing Clock) messages to reduce noise in the logs
                        //if (status !== 0xFE && status !== 0xF8) {
                        if (status !== 0xFE ) {
                            logReceivedMessage("Unknown message", status, data1, data2, null, channel);
                        }
                    }
                });
            });

            randomizeUnlockedControls();
            console.log("MIDI controller initialized");
        });
    </script>
</body>
</html>
